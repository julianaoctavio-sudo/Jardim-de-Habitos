<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jardim de Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green-50: #f0f7ee; --green-100: #d4eacc; --green-200: #a8d499;
    --green-400: #5fa843; --green-600: #3a7a28; --green-800: #1e4a12;
    --cream: #faf7f2; --cream-dark: #f0ebe2;
    --text-primary: #1a1a18; --text-secondary: #5a5a50; --text-muted: #9a9a88;
    --border: rgba(0,0,0,0.08); --shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-primary); min-height: 100vh; }

  /* AUTH */
  #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cream); position: relative; overflow: hidden; }
  #auth-screen::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 600px 400px at 20% 80%, rgba(95,168,67,0.12) 0%, transparent 70%), radial-gradient(ellipse 400px 300px at 80% 20%, rgba(46,148,117,0.1) 0%, transparent 70%); }
  .auth-card { position: relative; background: white; border: 1px solid var(--border); border-radius: 24px; padding: 56px 48px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
  .auth-icon { width: 72px; height: 72px; margin: 0 auto 24px; background: var(--green-50); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .auth-title { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400; margin-bottom: 8px; }
  .auth-title em { font-style: italic; color: var(--green-600); }
  .auth-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 36px; line-height: 1.6; }
  .oauth-btn { width: 100%; padding: 14px 24px; border-radius: 12px; border: 1.5px solid var(--border); background: white; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; transition: all 0.15s; }
  .oauth-btn:hover { background: var(--cream); transform: translateY(-1px); box-shadow: var(--shadow); }
  .oauth-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* APP */
  #app-screen { display: none; }
  .topbar { background: white; border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 400; color: var(--green-800); display: flex; align-items: center; gap: 8px; }
  .topbar-logo em { font-style: italic; color: var(--green-600); }
  .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-100); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--green-800); overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .btn-logout { font-size: 13px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; font-family: 'DM Sans', sans-serif; }
  .btn-logout:hover { color: var(--text-primary); background: var(--cream); }

  .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  .month-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .month-nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 16px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .month-nav-btn:hover { background: var(--green-50); color: var(--green-600); }
  .month-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 400; flex: 1; }
  .month-title em { font-style: italic; color: var(--green-600); }

  /* PEOPLE GRID */
  .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(540px, 1fr)); gap: 24px; }

  /* PERSON CARD */
  .person-card { background: white; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
  .person-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .person-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: white; flex-shrink: 0; }
  .person-info { flex: 1; min-width: 0; }
  .person-name { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .person-stats { display: flex; gap: 10px; margin-top: 3px; flex-wrap: wrap; }
  .person-stat { font-size: 12px; color: var(--text-muted); }
  .person-stat strong { color: var(--green-600); font-weight: 500; }
  .person-btns { display: flex; gap: 8px; flex-shrink: 0; }

  .btn-sm { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-secondary); transition: all 0.15s; white-space: nowrap; }
  .btn-sm:hover { background: var(--cream-dark); }
  .btn-sm-green { background: var(--green-600); color: white; border-color: var(--green-600); }
  .btn-sm-green:hover { background: var(--green-800); color: white; }

  /* GARDEN */
  .person-garden { position: relative; }
  .person-garden canvas { width: 100%; height: 90px; display: block; }
  .garden-pill { position: absolute; bottom: 6px; right: 10px; background: rgba(255,255,255,0.92); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 500; color: var(--green-800); }

  /* PROGRESS */
  .person-progress { padding: 8px 20px 10px; border-bottom: 1px solid var(--border); }
  .progress-track { height: 5px; background: var(--cream-dark); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #5fa843, #2e9475); transition: width 0.5s; }
  .progress-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* HABITS TABLE */
  .habits-scroll { overflow-x: auto; }
  table.ht { width: 100%; border-collapse: collapse; min-width: 380px; }
  .ht thead th { padding: 7px 3px; text-align: center; font-size: 10px; font-weight: 400; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .ht thead th:first-child { text-align: left; padding-left: 20px; width: 150px; }
  .ht tbody tr:hover { background: var(--cream); }
  .ht tbody td { padding: 7px 3px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: middle; }
  .ht tbody td:first-child { text-align: left; padding-left: 20px; }
  .hname { display: flex; align-items: center; gap: 7px; }
  .hdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .htext { font-size: 13px; color: var(--text-primary); }
  .hbadge { font-size: 10px; color: var(--text-muted); background: var(--cream-dark); padding: 2px 5px; border-radius: 8px; white-space: nowrap; }
  .chk { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); background: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .chk:not(.done):not(.future):hover { border-color: #5fa843; background: var(--green-50); }
  .chk.done { border-color: transparent; }
  .chk.done svg { display: block; }
  .chk svg { display: none; width: 11px; height: 11px; }
  .chk.today-col { box-shadow: 0 0 0 2px #4a9bb5; }
  .chk.future { opacity: 0.2; pointer-events: none; }
  .today-m { font-size: 9px; font-weight: 500; color: #4a9bb5; }
  .no-habits { padding: 20px; text-align: center; font-size: 13px; color: var(--text-muted); }

  /* ADD PERSON */
  .add-person-card { background: white; border: 2px dashed var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; min-height: 180px; cursor: pointer; transition: all 0.15s; }
  .add-person-card:hover { border-color: #5fa843; background: var(--green-50); }
  .add-person-inner { text-align: center; }
  .add-person-icon { font-size: 28px; margin-bottom: 8px; }
  .add-person-text { font-size: 14px; color: var(--text-secondary); }

  /* MODALS */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.38); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: white; border-radius: 20px; padding: 32px; width: 90%; max-width: 440px; box-shadow: 0 24px 80px rgba(0,0,0,0.15); transform: translateY(16px); transition: transform 0.2s; max-height: 88vh; overflow-y: auto; }
  .overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-primary); background: white; }
  .form-input:focus { outline: none; border-color: #5fa843; }
  .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
  .swatch.sel { border-color: var(--text-primary); transform: scale(1.15); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-primary { flex: 1; padding: 12px; border-radius: 10px; background: var(--green-600); color: white; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: background 0.15s; }
  .btn-primary:hover { background: var(--green-800); }
  .btn-cancel { padding: 12px 20px; border-radius: 10px; background: none; color: var(--text-secondary); border: 1px solid var(--border); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; }
  .btn-cancel:hover { background: var(--cream); }

  /* MANAGE LIST */
  .manage-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .manage-row:last-child { border-bottom: none; }
  .manage-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .manage-name { flex: 1; font-size: 14px; color: var(--text-primary); }
  .manage-pts { font-size: 12px; color: var(--text-muted); background: var(--cream-dark); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .btn-del { padding: 5px 12px; border-radius: 8px; border: 1px solid #fecaca; background: #fff5f5; color: #dc2626; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; transition: background 0.15s; white-space: nowrap; }
  .btn-del:hover { background: #fee2e2; }
  .empty-manage { padding: 20px; text-align: center; font-size: 13px; color: var(--text-muted); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-primary); color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; z-index: 9999; transform: translateY(20px); opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 768px) { .people-grid { grid-template-columns: 1fr; } .topbar { padding: 0 16px; } .person-btns { flex-direction: column; } }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">🌱</div>
    <h1 class="auth-title">Jardim de <em>Hábitos</em></h1>
    <p class="auth-sub">Cultive seus hábitos dia a dia e veja seu jardim florescer.</p>
    <button class="oauth-btn" onclick="signInWith('google')">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar com Google
    </button>
    <button class="oauth-btn" onclick="signInWith('github')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"/></svg>
      Entrar com GitHub
    </button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">🌿 Jardim de <em>Hábitos</em></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="user-avatar" id="user-avatar">?</div>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="month-header">
      <button class="month-nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <h1 class="month-title" id="month-title"></h1>
      <button class="month-nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="people-grid" id="people-grid"></div>
  </div>
</div>

<!-- MODAL: NOVA PESSOA -->
<div class="overlay" id="person-overlay" onclick="closeIfOverlay(event,'person-overlay',closePersonModal)">
  <div class="modal">
    <h2 class="modal-title">Nova pessoa</h2>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input class="form-input" id="p-name" placeholder="Ex: Juliana, Maria..." />
    </div>
    <div class="form-group">
      <label class="form-label">Cor do avatar</label>
      <div class="swatch-row" id="avatar-swatches"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePersonModal()">Cancelar</button>
      <button class="btn-primary" onclick="savePerson()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL: NOVO HÁBITO -->
<div class="overlay" id="habit-overlay" onclick="closeIfOverlay(event,'habit-overlay',closeHabitModal)">
  <div class="modal">
    <h2 class="modal-title">Novo hábito</h2>
    <div class="form-group">
      <label class="form-label">Nome do hábito</label>
      <input class="form-input" id="h-name" placeholder="Ex: Meditar 10 minutos" />
    </div>
    <div class="form-group">
      <label class="form-label">Pontos por dia</label>
      <input class="form-input" id="h-pts" type="number" min="1" max="100" value="5" />
    </div>
    <div class="form-group">
      <label class="form-label">Cor</label>
      <div class="swatch-row" id="habit-swatches"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeHabitModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveHabit()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: GERENCIAR HÁBITOS -->
<div class="overlay" id="manage-overlay" onclick="closeIfOverlay(event,'manage-overlay',closeManageModal)">
  <div class="modal">
    <h2 class="modal-title" id="manage-title">Gerenciar hábitos</h2>
    <div id="manage-list"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="closeManageModal()">Fechar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://sfxkjpohlijxyvbzrabb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qJQDvdFTQauCM40w10ir8A_axz95xi6';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const HABIT_COLORS = ['#5fa843','#4a9bb5','#e8a020','#c9607a','#2e9475','#7b6db5','#c86040','#8b6f4e'];
const AVATAR_COLORS = ['#3a7a28','#1a5fa8','#a03060','#b87010','#1a6b50','#5a4a9a'];
const DEFAULT_HABITS = [
  {name:'Acordar cedo',pts:5,color:'#e8a020'},
  {name:'Treino / academia',pts:10,color:'#4a9bb5'},
  {name:'Alimentação saudável',pts:7,color:'#5fa843'},
  {name:'Ler / estudar',pts:8,color:'#7b6db5'},
];
const LEVELS = [
  {name:'Semente',min:0},{name:'Broto',min:50},{name:'Muda',min:150},
  {name:'Arbusto',min:300},{name:'Jardim florido',min:500},
  {name:'Jardim exuberante',min:800},{name:'Paraíso verde',min:1200},
];

let currentUser=null, currentYear=new Date().getFullYear(), currentMonth=new Date().getMonth();
let people=[], selectedHabitColor=HABIT_COLORS[0], selectedAvatarColor=AVATAR_COLORS[0], activePersonId=null;

// AUTH
async function signInWith(p){await db.auth.signInWithOAuth({provider:p,options:{redirectTo:window.location.href}});}
async function logout(){await db.auth.signOut();location.reload();}
async function initAuth(){
  const {data:{session}}=await db.auth.getSession();
  if(session){currentUser=session.user;await showApp();}else showAuth();
  db.auth.onAuthStateChange(async(_,s)=>{if(s){currentUser=s.user;await showApp();}else showAuth();});
}
function showAuth(){document.getElementById('auth-screen').style.display='flex';document.getElementById('app-screen').style.display='none';}
async function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const meta=currentUser.user_metadata;
  const el=document.getElementById('user-avatar');
  if(meta.avatar_url)el.innerHTML=`<img src="${meta.avatar_url}" alt=""/>`;
  else el.textContent=(meta.full_name||currentUser.email||'?')[0].toUpperCase();
  await loadAll();renderAll();
}

// DATA
async function loadAll(){
  const {data:pd}=await db.from('people').select('*').eq('user_id',currentUser.id).order('created_at');
  let raw=pd||[];
  if(raw.length===0){
    await db.from('people').insert({user_id:currentUser.id,name:'Eu',color:AVATAR_COLORS[0]});
    const {data:p2}=await db.from('people').select('*').eq('user_id',currentUser.id).order('created_at');
    raw=p2||[];
  }
  const fd=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
  const ld=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${getDaysInMonth()}`;
  people=[];
  for(const p of raw){
    const {data:hd}=await db.from('habits').select('*').eq('person_id',p.id).order('created_at');
    let habits=hd||[];
    if(habits.length===0){
      for(const h of DEFAULT_HABITS)await db.from('habits').insert({user_id:currentUser.id,person_id:p.id,...h});
      const {data:h2}=await db.from('habits').select('*').eq('person_id',p.id).order('created_at');
      habits=h2||[];
    }
    const {data:cd}=await db.from('habit_checks').select('*').eq('person_id',p.id).gte('check_date',fd).lte('check_date',ld);
    const checks={};(cd||[]).forEach(c=>{checks[`${c.habit_id}_${c.check_date}`]=c.id;});
    people.push({...p,habits,checks});
  }
}

function getDaysInMonth(){return new Date(currentYear,currentMonth+1,0).getDate();}
function getToday(){const n=new Date();return{y:n.getFullYear(),m:n.getMonth(),d:n.getDate()};}
function getLevel(pts){let i=0;for(let j=LEVELS.length-1;j>=0;j--){if(pts>=LEVELS[j].min){i=j;break;}}return i;}
function personPts(p){let pts=0;for(const k in p.checks){const hid=k.split('_')[0];const h=p.habits.find(x=>x.id==hid);if(h)pts+=h.pts;}return pts;}

async function toggleCheck(pid,hid,day){
  const person=people.find(p=>p.id===pid);if(!person)return;
  const ds=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const key=`${hid}_${ds}`;
  if(person.checks[key]){
    await db.from('habit_checks').delete().eq('id',person.checks[key]);
    delete person.checks[key];
  }else{
    const {data}=await db.from('habit_checks').insert({user_id:currentUser.id,person_id:pid,habit_id:hid,check_date:ds}).select().single();
    if(data)person.checks[key]=data.id;
  }
  renderAll();
}

async function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  await loadAll();renderAll();
}

// RENDER
function renderAll(){
  document.getElementById('month-title').innerHTML=`${MONTHS_PT[currentMonth]} <em>${currentYear}</em>`;
  const grid=document.getElementById('people-grid');
  grid.innerHTML='';
  people.forEach(p=>grid.appendChild(buildCard(p)));
  const add=document.createElement('div');
  add.className='add-person-card';add.onclick=openPersonModal;
  add.innerHTML='<div class="add-person-inner"><div class="add-person-icon">＋</div><div class="add-person-text">Adicionar pessoa</div></div>';
  grid.appendChild(add);
}

function buildCard(person){
  const days=getDaysInMonth(),today=getToday(),pts=personPts(person);
  const lvlIdx=getLevel(pts),level=LEVELS[lvlIdx],nextLvl=LEVELS[lvlIdx+1];
  const ptsIn=pts-level.min,ptsNeed=nextLvl?nextLvl.min-level.min:1;
  const pct=Math.min(100,Math.round(ptsIn/ptsNeed*100));
  const totalC=Object.keys(person.checks).length;

  const card=document.createElement('div');
  card.className='person-card';
  card.innerHTML=`
    <div class="person-header">
      <div class="person-avatar" style="background:${person.color}">${person.name[0].toUpperCase()}</div>
      <div class="person-info">
        <div class="person-name">${person.name}</div>
        <div class="person-stats">
          <span class="person-stat"><strong>${pts}</strong> pts</span>
          <span class="person-stat"><strong>${totalC}</strong> feitos</span>
          <span class="person-stat">Nível <strong>${lvlIdx+1}</strong> — ${level.name}</span>
        </div>
      </div>
      <div class="person-btns">
        <button class="btn-sm" onclick="openManageModal('${person.id}')">⚙ Gerenciar</button>
        <button class="btn-sm btn-sm-green" onclick="openHabitModal('${person.id}')">+ Hábito</button>
      </div>
    </div>
    <div class="person-garden">
      <canvas id="gc-${person.id}"></canvas>
      <div class="garden-pill">🌿 ${level.name}</div>
    </div>
    <div class="person-progress">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${nextLvl?`${ptsIn} / ${ptsNeed} pts para o próximo nível`:'Nível máximo!'}</div>
    </div>
    <div class="habits-scroll">
      ${person.habits.length===0?`<div class="no-habits">Nenhum hábito. Clique em "+ Hábito" para adicionar.</div>`:''}
      <table class="ht" id="ht-${person.id}" style="${person.habits.length===0?'display:none':''}">
        <thead id="thead-${person.id}"></thead>
        <tbody id="tbody-${person.id}"></tbody>
      </table>
    </div>`;

  // thead
  const thead=card.querySelector(`#thead-${person.id}`);
  let h='<tr><th>Hábito</th>';
  for(let d=1;d<=days;d++){
    const iT=today.y===currentYear&&today.m===currentMonth&&today.d===d;
    h+=`<th>${iT?`<div class="today-m">hoje</div>`:''}${d}</th>`;
  }
  thead.innerHTML=h+'</tr>';

  // tbody
  const tbody=card.querySelector(`#tbody-${person.id}`);
  tbody.innerHTML=person.habits.map(habit=>{
    let row=`<tr><td><div class="hname"><div class="hdot" style="background:${habit.color}"></div><span class="htext">${habit.name}</span><span class="hbadge">${habit.pts}pts</span></div></td>`;
    for(let d=1;d<=days;d++){
      const ds=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const key=`${habit.id}_${ds}`,done=!!person.checks[key];
      const iT=today.y===currentYear&&today.m===currentMonth&&today.d===d;
      const iF=currentYear>today.y||(currentYear===today.y&&currentMonth>today.m)||(currentYear===today.y&&currentMonth===today.m&&d>today.d);
      const cls=['chk',done?'done':'',iT?'today-col':'',iF?'future':''].filter(Boolean).join(' ');
      const st=done?`background:${habit.color};`:'';
      row+=`<td><button class="${cls}" style="${st}" onclick="toggleCheck('${person.id}','${habit.id}',${d})"><svg viewBox="0 0 11 11" fill="none"><path d="M1 5.5l3 3 6-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button></td>`;
    }
    return row+'</tr>';
  }).join('');

  setTimeout(()=>{const c=card.querySelector(`#gc-${person.id}`);if(c)drawGarden(c,lvlIdx);},50);
  return card;
}

// PERSON MODAL
function openPersonModal(){
  selectedAvatarColor=AVATAR_COLORS[0];
  document.getElementById('avatar-swatches').innerHTML=AVATAR_COLORS.map(c=>`<div class="swatch${c===selectedAvatarColor?' sel':''}" style="background:${c}" onclick="selAvatar('${c}',this)"></div>`).join('');
  document.getElementById('p-name').value='';
  document.getElementById('person-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('p-name').focus(),100);
}
function closePersonModal(){document.getElementById('person-overlay').classList.remove('open');}
function selAvatar(c,el){selectedAvatarColor=c;document.querySelectorAll('#avatar-swatches .swatch').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
async function savePerson(){
  const name=document.getElementById('p-name').value.trim();if(!name)return;
  const {data}=await db.from('people').insert({user_id:currentUser.id,name,color:selectedAvatarColor}).select().single();
  if(data){for(const h of DEFAULT_HABITS)await db.from('habits').insert({user_id:currentUser.id,person_id:data.id,...h});}
  closePersonModal();await loadAll();renderAll();showToast(`${name} adicionado(a)!`);
}

// HABIT MODAL
function openHabitModal(pid){
  activePersonId=pid;selectedHabitColor=HABIT_COLORS[0];
  document.getElementById('habit-swatches').innerHTML=HABIT_COLORS.map(c=>`<div class="swatch${c===selectedHabitColor?' sel':''}" style="background:${c}" onclick="selHabitColor('${c}',this)"></div>`).join('');
  document.getElementById('h-name').value='';document.getElementById('h-pts').value='5';
  document.getElementById('habit-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('h-name').focus(),100);
}
function closeHabitModal(){document.getElementById('habit-overlay').classList.remove('open');}
function selHabitColor(c,el){selectedHabitColor=c;document.querySelectorAll('#habit-swatches .swatch').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
async function saveHabit(){
  const name=document.getElementById('h-name').value.trim();
  const pts=parseInt(document.getElementById('h-pts').value)||5;
  if(!name||!activePersonId)return;
  const {data}=await db.from('habits').insert({user_id:currentUser.id,person_id:activePersonId,name,pts,color:selectedHabitColor}).select().single();
  if(data){const p=people.find(x=>x.id===activePersonId);if(p)p.habits.push(data);}
  closeHabitModal();renderAll();showToast('Hábito adicionado!');
}

// MANAGE MODAL
function openManageModal(pid){
  activePersonId=pid;
  const person=people.find(p=>p.id===pid);if(!person)return;
  document.getElementById('manage-title').textContent=`Hábitos de ${person.name}`;
  renderManageList(person);
  document.getElementById('manage-overlay').classList.add('open');
}
function renderManageList(person){
  const list=document.getElementById('manage-list');
  if(person.habits.length===0){list.innerHTML='<div class="empty-manage">Nenhum hábito cadastrado.</div>';return;}
  list.innerHTML=person.habits.map(h=>`
    <div class="manage-row" id="mr-${h.id}">
      <div class="manage-dot" style="background:${h.color}"></div>
      <span class="manage-name">${h.name}</span>
      <span class="manage-pts">${h.pts} pts</span>
      <button class="btn-del" onclick="deleteHabit('${person.id}','${h.id}')">Excluir</button>
    </div>`).join('');
}
function closeManageModal(){document.getElementById('manage-overlay').classList.remove('open');}
async function deleteHabit(pid,hid){
  if(!confirm('Excluir este hábito? Todas as marcações também serão removidas.'))return;
  await db.from('habit_checks').delete().eq('habit_id',hid);
  await db.from('habits').delete().eq('id',hid);
  const person=people.find(p=>p.id===pid);
  if(person){
    person.habits=person.habits.filter(h=>h.id!==hid);
    Object.keys(person.checks).filter(k=>k.startsWith(hid+'_')).forEach(k=>delete person.checks[k]);
    renderManageList(person);
  }
  renderAll();showToast('Hábito excluído!');
}

function closeIfOverlay(e,id,closeFn){if(e.target===document.getElementById(id))closeFn();}

// GARDEN
function drawGarden(canvas,lvlIdx){
  const ctx=canvas.getContext('2d'),W=canvas.offsetWidth||540,H=90;
  canvas.width=W*(window.devicePixelRatio||1);canvas.height=H*(window.devicePixelRatio||1);
  ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);
  const skys=['#d4f0c0','#c8ecf0','#c0e4f8','#b8e8f4','#a8e0f0','#90d8e8','#78c8e0'];
  ctx.fillStyle=skys[Math.min(lvlIdx,6)];ctx.fillRect(0,0,W,H);
  const gY=H-20;
  ctx.fillStyle='#8bc34a';ctx.fillRect(0,gY,W,9);
  ctx.fillStyle='#6d4c41';ctx.fillRect(0,gY+9,W,H-gY-9);
  drawSun(ctx,W-28,20,lvlIdx);
  if(lvlIdx>=2)drawCloud(ctx,38,16);
  if(lvlIdx===0){ctx.fillStyle='#795548';ctx.beginPath();ctx.ellipse(W/2,gY-3,5,7,0.3,0,Math.PI*2);ctx.fill();}
  else if(lvlIdx===1)dSprout(ctx,W/2,gY,0.75);
  else if(lvlIdx===2){dPlant(ctx,W/2,gY,0.75);dFlower(ctx,W*.25,gY,'#e8a020',.5);dFlower(ctx,W*.75,gY,'#c9607a',.5);}
  else if(lvlIdx===3){dBush(ctx,W/2,gY,.8);dFlower(ctx,W*.12,gY,'#e8a020',.65);dFlower(ctx,W*.32,gY,'#c9607a',.65);dFlower(ctx,W*.68,gY,'#7b6db5',.65);dFlower(ctx,W*.88,gY,'#4a9bb5',.65);}
  else if(lvlIdx===4){dTree(ctx,W/2,gY,'#2e9475',.8);dBush(ctx,W*.18,gY,.55);dBush(ctx,W*.82,gY,.55);['#e8a020','#c9607a','#7b6db5','#4a9bb5','#c86040','#2e9475'].forEach((c,i)=>dFlower(ctx,W*.08+W*.84*i/5,gY,c,.7));}
  else if(lvlIdx===5){dTree(ctx,W*.34,gY,'#2e9475',.9);dTree(ctx,W*.66,gY,'#1a6b4a',.75);dBush(ctx,W*.08,gY,.6);dBush(ctx,W*.92,gY,.6);['#e8a020','#c9607a','#7b6db5','#4a9bb5','#c86040','#2e9475','#e8a020','#c9607a'].forEach((c,i)=>dFlower(ctx,W*.04+W*.92*i/7,gY,c,.78));}
  else{dTree(ctx,W*.2,gY,'#2e9475',.95);dTree(ctx,W*.5,gY,'#1a6b4a',1.1);dTree(ctx,W*.8,gY,'#2e9475',.85);dBush(ctx,W*.05,gY,.7);dBush(ctx,W*.95,gY,.7);['#e8a020','#c9607a','#7b6db5','#4a9bb5','#c86040','#2e9475','#e8a020','#c9607a','#7b6db5','#4a9bb5'].forEach((c,i)=>dFlower(ctx,W*.02+W*.96*i/9,gY,c,.85));}
}
function dSprout(ctx,x,y,s){ctx.strokeStyle='#4caf50';ctx.lineWidth=2*s;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-20*s);ctx.stroke();ctx.fillStyle='#66bb6a';ctx.beginPath();ctx.ellipse(x-6*s,y-15*s,6*s,4*s,-.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+7*s,y-20*s,6*s,4*s,.5,0,Math.PI*2);ctx.fill();}
function dPlant(ctx,x,y,s){ctx.strokeStyle='#388e3c';ctx.lineWidth=2*s;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-28*s);ctx.stroke();ctx.fillStyle='#4caf50';for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(i%2===0?x-10*s:x+10*s,y-12*s-i*8*s,9*s,5*s,i%2===0?-.4:.4,0,Math.PI*2);ctx.fill();}}
function dBush(ctx,x,y,s){[['#388e3c',0,-18,13],['#4caf50',-11,-11,10],['#4caf50',11,-11,10],['#66bb6a',-6,-25,8],['#66bb6a',6,-25,8]].forEach(([c,dx,dy,r])=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(x+dx*s,y+dy*s,r*s,0,Math.PI*2);ctx.fill();});}
function dTree(ctx,x,y,color,s){ctx.fillStyle='#795548';ctx.fillRect(x-4*s,y-34*s,8*s,34*s);ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y-58*s,20*s,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a5c38';ctx.beginPath();ctx.arc(x,y-74*s,15*s,0,Math.PI*2);ctx.fill();ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y-86*s,10*s,0,Math.PI*2);ctx.fill();}
function dFlower(ctx,x,y,color,s){const fy=y-12*s-3*s;ctx.strokeStyle='#4caf50';ctx.lineWidth=1.2*s;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,fy+3*s);ctx.stroke();ctx.fillStyle=color;for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.arc(x+Math.cos(a)*5*s,fy+Math.sin(a)*5*s,3.5*s,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#fff9c4';ctx.beginPath();ctx.arc(x,fy,3*s,0,Math.PI*2);ctx.fill();}
function drawSun(ctx,x,y,lvl){ctx.fillStyle='#FAC775';ctx.beginPath();ctx.arc(x,y,11+lvl*1.5,0,Math.PI*2);ctx.fill();}
function drawCloud(ctx,x,y){ctx.fillStyle='rgba(255,255,255,0.82)';[{dx:0,dy:0,r:9},{dx:-10,dy:4,r:7},{dx:10,dy:4,r:7},{dx:-4,dy:8,r:6},{dx:4,dy:8,r:6}].forEach(b=>{ctx.beginPath();ctx.arc(x+b.dx,y+b.dy,b.r,0,Math.PI*2);ctx.fill();});}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

initAuth();
</script>
